<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Route Safety Monitor</title>
    <!-- Google Maps Extended Component Library -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/@googlemaps/extended-component-library/0.6.11/index.min.js"></script>
    <!-- Load local data natively to bypass CORS -->
    <script src="data.js"></script>
    
    <style>
        :root { --bg: #ffffff; --border: #000000; --accent-red: #ff0000; --accent-green: #00cc00; }
        
        body, html { margin: 0; padding: 0; height: 100%; font-family: -apple-system, sans-serif; overflow: hidden; }
        
        .wrapper { 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            width: 100vw; 
        }

        .sidebar {
            width: 100%;
            padding: 1.5rem;
            border-bottom: 2px solid var(--border);
            background: #fff;
            z-index: 1000;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        h1 { font-size: 1rem; font-weight: 900; text-transform: uppercase; margin: 0 0 1.5rem 0; line-height: 1; letter-spacing: 1px; }
        
        .input-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .input-group { flex: 1; }
        
        label { display: block; font-size: 0.6rem; font-weight: 800; text-transform: uppercase; margin-bottom: 3px; color: #666; }
        
        input {
            width: 100%; border: none; border-bottom: 2px solid var(--border);
            padding: 8px 0; font-size: 1rem; outline: none; text-transform: capitalize;
            border-radius: 0;
        }

        button {
            width: 100%; background: var(--border); color: white; border: none; 
            padding: 14px; font-weight: 700; text-transform: uppercase; 
            cursor: pointer; font-size: 0.8rem;
        }

        /* Accident Total Display */
        .total-display {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #eee;
            display: none; /* Hidden until search */
        }
        .total-label { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; color: #666; }
        .total-count { font-size: 2.5rem; font-weight: 900; color: var(--accent-red); line-height: 1; margin-bottom: 10px; }

        .route-legend {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 12px;
            font-size: 0.7rem;
            font-weight: 700;
        }

        .route-swatch {
            width: 25px;
            height: 6px;
            border-radius: 3px;
        }

        #map-container { flex-grow: 1; width: 100%; background: #f0f0f0; position: relative; }
        gmp-map { height: 100%; width: 100%; }

        /* Custom marker styling for AdvancedMarkerElement */
        .pin-marker {
            background: #000; color: #fff; width: 24px !important; height: 24px !important;
            border-radius: 50% 50% 50% 0; transform: rotate(-45deg);
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 10px; border: 2px solid #fff;
            box-shadow: 0 0 5px rgba(0,0,0,0.3);
            position: absolute;
            transform-origin: 50% 100%;
        }
        .pin-marker span { transform: rotate(45deg); }

        .safe-tag {
            background: var(--accent-green);
            color: #fff;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 900;
            font-size: 11px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            text-transform: uppercase;
        }

        @media (min-width: 768px) {
            .wrapper { flex-direction: row; }
            .sidebar { 
                width: 340px; 
                height: 100vh; 
                border-bottom: none; 
                border-right: 2px solid var(--border); 
                padding: 3rem 2rem;
            }
            .input-row { flex-direction: column; gap: 0; }
            h1 { font-size: 1.5rem; margin-bottom: 3rem; }
            .input-group { margin-bottom: 1.5rem; }
            .total-display { margin-top: auto; }
        }

        #status { font-size: 0.7rem; font-weight: 700; margin-top: 10px; text-align: center; display: none; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="sidebar">
        <h1>Safety Analytics V3</h1>
        
        <div class="input-row">
            <div class="input-group">
                <label>Origin</label>
                <input type="text" id="fromInput" list="cityList" placeholder="e.g. Samarkha" value="Samarkha">
            </div>
            <div class="input-group">
                <label>Destination</label>
                <input type="text" id="toInput" list="cityList" placeholder="e.g. Bhalej" value="Bhalej">
            </div>
        </div>
        
        <datalist id="cityList"></datalist>

        <button id="btn">Analyze Safety</button>
        <div id="status">PROCESSING ROUTES...</div>

        <div class="total-display" id="totalBox">
            <div class="total-label">Accidents on Primary Route</div>
            <div class="total-count" id="accidentTotal">0</div>
            
            <div style="border-top: 1px solid #ddd; padding-top: 12px; margin-top: 12px;"></div>
            
            <div class="route-legend">
                <div class="route-swatch" style="background: var(--accent-red);"></div>
                <div style="color: var(--accent-red);">PRIMARY (ACCIDENT PRONE)</div>
            </div>
            
            <div class="route-legend" id="safeLegend" style="display: none;">
                <div class="route-swatch" style="background: var(--accent-green);"></div>
                <div style="color: var(--accent-green);">ALTERNATIVE (SAFE ROUTE)</div>
            </div>
        </div>
    </div>
    
    <div id="map-container">
        <gmpx-api-loader key="AIzaSyDYIUpoMvq7bAyMoZjskqjmGddG1fXkUgc" solution-channel="GMP_GE_mapsandplacesautocomplete_v2"></gmpx-api-loader>
        <gmp-map map-id="DEMO_MAP_ID" center="22.5,72.8" zoom="8" id="googleMap"></gmp-map>
    </div>
</div>

<script>
    let innerMap;
    let AdvancedMarkerElement;
    
    async function initGoogleMaps() {
        await customElements.whenDefined('gmp-map');
        const gmpMap = document.getElementById('googleMap');
        innerMap = gmpMap.innerMap;
        
        const markerLib = await google.maps.importLibrary("marker");
        AdvancedMarkerElement = markerLib.AdvancedMarkerElement;
        
        innerMap.setOptions({
            mapTypeControl: false,
            streetViewControl: false
        });
    }

    let cityDB = {};
    let accidentData = {};
    let dataLoaded = false;
    let mapLayers = []; 

    function clearMapLayers() {
        for(let layer of mapLayers) {
            layer.setMap(null);
        }
        mapLayers = [];
    }

    function loadDefaultData() {
        if (typeof localData === 'undefined') {
            alert('Error: data.js failed to load. Please ensure data.js exists in the parent directory.');
            return;
        }

        const data = localData; 
        
        cityDB = {};
        accidentData = {};
        const datalist = document.getElementById('cityList');
        datalist.innerHTML = ''; // Clear existing
        
        data.forEach(row => {
            const fromCity = row['From']?.toString().toLowerCase().trim();
            const toCity = row['To']?.toString().toLowerCase().trim();
            
            if (!fromCity || !toCity) return;

            // Save actual coordinates from Excel data
            if (row['Fromlat'] && row['Fromlng']) {
                cityDB[fromCity] = [parseFloat(row['Fromlat']), parseFloat(row['Fromlng'])];
            }
            if (row['Tolat'] && row['Tolng']) {
                cityDB[toCity] = [parseFloat(row['Tolat']), parseFloat(row['Tolng'])];
            }
            
            const accidents = parseInt(row['Total accdent (1 year)']) || 0;
            accidentData[`${fromCity}-${toCity}`] = accidents;
            accidentData[`${toCity}-${fromCity}`] = accidents;
        });

        // Populate dropdown with available cities
        Object.keys(cityDB).forEach(city => {
            const option = document.createElement('option');
            // Capitalize first letter strictly for display
            option.value = city.charAt(0).toUpperCase() + city.slice(1);
            datalist.appendChild(option);
        });

        dataLoaded = true;
        console.log("data.js loaded successfully and maps populated directly from Excel data points.");
    }

    // Call it immediately after init
    document.addEventListener('DOMContentLoaded', async () => {
        await initGoogleMaps();
        loadDefaultData();
    });

    function distributePins(coords, numPins) {
        if (numPins <= 0 || coords.length === 0) return [];
        if (numPins === 1) return [coords[Math.floor(coords.length / 2)]];
        
        const pins = [];
        const step = (coords.length - 2) / (numPins + 1); 
        
        for (let i = 1; i <= numPins; i++) {
            const index = Math.floor(step * i);
            if(index > 0 && index < coords.length) {
                pins.push(coords[index]);
            }
        }
        return pins;
    }

    function createCustomMarker(text) {
        const div = document.createElement('div');
        div.className = 'pin-marker';
        const span = document.createElement('span');
        span.innerText = text;
        div.appendChild(span);
        return div;
    }

    async function fetchAndDrawRoute(start, end, accidents) {
        try {
            const { DirectionsService } = await google.maps.importLibrary('routes');
            const directionsService = new DirectionsService();
            
            const originProp = (typeof start === 'string') ? start : { lat: start[0], lng: start[1] };
            const destProp = (typeof end === 'string') ? end : { lat: end[0], lng: end[1] };

            const request = {
                origin: originProp,
                destination: destProp,
                travelMode: google.maps.TravelMode.DRIVING,
                provideRouteAlternatives: true
            };

            const response = await new Promise((resolve, reject) => {
                directionsService.route(request, (res, status) => {
                    if (status === 'OK') resolve(res);
                    else reject(new Error("Directions request failed due to " + status));
                });
            });

            if (!response.routes || response.routes.length === 0) {
                throw new Error("Routes not found from Google Maps");
            }

            // Fallback: If Google Maps only finds 1 route, we forcefully generate a detour route
            if (response.routes.length === 1) {
                const leg = response.routes[0].legs[0];
                const startLoc = leg.start_location;
                const endLoc = leg.end_location;
                
                const midLat = (startLoc.lat() + endLoc.lat()) / 2;
                const midLng = (startLoc.lng() + endLoc.lng()) / 2;
                const dLat = endLoc.lat() - startLoc.lat();
                const dLng = endLoc.lng() - startLoc.lng();
                const detourLat = midLat - (dLng * 0.15); // Offset perpendicular to the path
                const detourLng = midLng + (dLat * 0.15); 
                
                const detourRequest = {
                    origin: request.origin,
                    destination: request.destination,
                    waypoints: [{ location: { lat: detourLat, lng: detourLng }, stopover: false }],
                    travelMode: google.maps.TravelMode.DRIVING
                };
                
                try {
                    const detourResponse = await new Promise((resolve, reject) => {
                        directionsService.route(detourRequest, (res, status) => {
                            if (status === 'OK') resolve(res);
                            else reject(status);
                        });
                    });
                    if (detourResponse.routes && detourResponse.routes.length > 0) {
                        response.routes.push(detourResponse.routes[0]);
                    }
                } catch(e) {
                    console.log("Fallback detour failed:", e);
                }
            }

            const routeBounds = new google.maps.LatLngBounds();

            // === 1. Draw Primary (Accidental) Route ===
            const primaryPath = response.routes[0].overview_path;
            const primaryCoords = primaryPath.map(p => ({ lat: p.lat(), lng: p.lng() }));
            const mainLeg = response.routes[0].legs[0];
            const actualStartLoc = { lat: mainLeg.start_location.lat(), lng: mainLeg.start_location.lng() };
            const actualEndLoc = { lat: mainLeg.end_location.lat(), lng: mainLeg.end_location.lng() };
            
            const primaryPoly = new google.maps.Polyline({
                path: primaryCoords,
                geodesic: true,
                strokeColor: '#ff0000',
                strokeOpacity: 0.9,
                strokeWeight: 6,
                zIndex: 2 // Keep accident route on top
            });
            primaryPoly.setMap(innerMap);
            mapLayers.push(primaryPoly);
            primaryCoords.forEach(c => routeBounds.extend(c));

            // Distribute accident pins along the primary route
            const pinCoords = distributePins(primaryCoords, accidents);
            pinCoords.forEach((p, idx) => {
                const accidentMarker = new AdvancedMarkerElement({
                    map: innerMap,
                    position: { lat: p.lat, lng: p.lng },
                    content: createCustomMarker(`${idx + 1}`)
                });
                
                const infoWindow = new google.maps.InfoWindow({
                    content: `<b>Incident #${idx + 1}</b><br>Accident recorded on this segment.`
                });
                accidentMarker.addListener('click', () => {
                    infoWindow.open({ anchor: accidentMarker, map: innerMap });
                });
                
                mapLayers.push(accidentMarker);
            });

            // === 2. Draw Alternative (Safe) Route (if available) ===
            const safeLegend = document.getElementById('safeLegend');
            if (response.routes.length > 1) {
                const safePath = response.routes[1].overview_path;
                const safeCoords = safePath.map(p => ({ lat: p.lat(), lng: p.lng() }));
                
                const safePoly = new google.maps.Polyline({
                    path: safeCoords,
                    geodesic: true,
                    strokeColor: '#00cc00', // Green
                    strokeOpacity: 0.8,
                    strokeWeight: 6,
                    zIndex: 1
                });
                safePoly.setMap(innerMap);
                mapLayers.push(safePoly);
                safeCoords.forEach(c => routeBounds.extend(c));

                // Add "SAFE ROUTE" marker in the middle of alternative route
                const midSafePoint = safeCoords[Math.floor(safeCoords.length / 2)];
                const safeLabelDiv = document.createElement('div');
                safeLabelDiv.className = 'safe-tag';
                safeLabelDiv.innerText = 'Safe Route';
                
                const safeMarker = new AdvancedMarkerElement({
                    map: innerMap,
                    position: { lat: midSafePoint.lat, lng: midSafePoint.lng },
                    content: safeLabelDiv
                });
                mapLayers.push(safeMarker);
                
                safeLegend.style.display = 'flex';
            } else {
                safeLegend.style.display = 'none';
            }

            // === 3. Add Start/End Markers ===
            const startMarker = new AdvancedMarkerElement({
                map: innerMap,
                position: actualStartLoc,
                content: createCustomMarker('S')
            });
            const endMarker = new AdvancedMarkerElement({
                map: innerMap,
                position: actualEndLoc,
                content: createCustomMarker('E')
            });
            mapLayers.push(startMarker, endMarker);

            return routeBounds;

        } catch(err) {
            console.error("Error drawing route segments:", err);
            return null;
        }
    }

    document.getElementById('btn').onclick = async () => {
        const fromInput = document.getElementById('fromInput').value;
        const toInput = document.getElementById('toInput').value;
        
        if (!fromInput || !toInput) {
            alert("Please enter both origin and destination.");
            return;
        }

        const from = fromInput.toLowerCase().trim();
        const to = toInput.toLowerCase().trim();
        
        document.getElementById('status').style.display = 'block';
        document.getElementById('totalBox').style.display = 'none';

        try {
            // Use exact coordinates from DB if they exist, otherwise just use the raw text and let Google Geocode it!
            const start = cityDB[from] || fromInput;
            const end = cityDB[to] || toInput;
            const routeKey = `${from}-${to}`;
            
            let totalAccidents = accidentData[routeKey];
            if (totalAccidents === undefined) totalAccidents = "No Data";
            
            document.getElementById('accidentTotal').innerText = totalAccidents;
            document.getElementById('totalBox').style.display = 'block';

            clearMapLayers();
            
            let pinsToDraw = typeof totalAccidents === 'number' ? totalAccidents : 0;
            
            // Draw primary and safe route
            const bounds = await fetchAndDrawRoute(start, end, pinsToDraw);
            
            if(bounds && innerMap) {
                innerMap.fitBounds(bounds, { padding: { top: 40, right: 40, bottom: 40, left: 40 } });
            }

            document.getElementById('status').style.display = 'none';

        } catch (err) {
            document.getElementById('status').style.display = 'none';
            alert("Error computing routes. Google could not find one of these locations, or routing failed.");
            console.error(err);
        }
    };
</script>
</body>
</html>
